<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Profile card component</title>

  <link rel="stylesheet" href="./styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <img class="bg_top" src="./images/bg-pattern-top.svg" alt="Body Background Pattern Image">
    <article>
      <img class="img crd_bg_ptrn" src="./images/bg-pattern-card.svg" alt="Profile Card Background Pattern">
      <section class="prof_dtls">
        <img class="img usr_pic" src="./images/image-victor.jpg" alt="Victor Crest Profile Picture">
        <h1>Victor Crest <span>26</span></h1>
        <p>London</p>
        <hr>
        <section class="metrics">
          <div class="flwrs">
            <h2>80K</h2>
            <p>Followers</p>
          </div>
          <div class="likes">
            <h2>803K</h2>
            <p>Likes</h2>
          </div>
          <div class="photos">
            <h2>1.4K</h2>
            <p>Photos</h2>
          </div>
        </section>
      </section>
    </article>
    <img class="bg_btm" src="./images/bg-pattern-top.svg" alt="Body Background Pattern Image">
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer">Frontend Mentor</a>. 
    Coded by <a href="https://www.frontendmentor.io/profile/TheCoder-Rahul" target="_blank" rel="noopener noreferrer">Rahul Kumar</a>.
  </footer>
</body>
</html>
